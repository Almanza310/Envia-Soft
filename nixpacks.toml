# Configuración de build para Railway (Nixpacks)
# Asegura que PHP + Node.js estén disponibles para compilar assets con Vite

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
